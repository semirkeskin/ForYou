name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.24.5"
          cache: true

      - name: Verify Flutter
        run: flutter --version

      - name: Ensure platform folders exist (android/)
        run: |
          if [ ! -d android ]; then
            flutter create --project-name sana_sakladiklarim --platforms=android .
          fi

      # Sabit keystore — her build ayni anahtarla imzalar, boylece sevgili
      # tablete her yeni APK 'guncelleme' olarak kurulur. Keystore GitHub
      # Actions cache'inde saklanir; ilk build'de uretilir, sonraki build'ler
      # cache'ten alir.
      - name: Restore signing keystore from cache
        id: keystore-cache
        uses: actions/cache@v4
        with:
          path: android/app/kiraz.jks
          key: kiraz-keystore-v1

      - name: Generate keystore (only first build)
        if: steps.keystore-cache.outputs.cache-hit != 'true'
        run: |
          keytool -genkeypair -v \
            -keystore android/app/kiraz.jks \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -alias kiraz \
            -storepass kirazkiraz -keypass kirazkiraz \
            -dname "CN=Kiraz, O=Kiraz, L=Istanbul, C=TR"

      - name: Save keystore to cache (first build only)
        if: steps.keystore-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: android/app/kiraz.jks
          key: kiraz-keystore-v1

      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=kirazkiraz
          keyPassword=kirazkiraz
          keyAlias=kiraz
          storeFile=kiraz.jks
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Build release APK (universal/fat)
        # --build-number her workflow calistirmasinda artar (GITHUB_RUN_NUMBER).
        # Boylece her APK Android'e farkli versiyon olarak gorunur ve MIUI
        # "ayni versiyon zaten kurulu" diyerek guncellemeyi reddetmez.
        run: flutter build apk --release --build-number=${{ github.run_number }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kiraz-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30
